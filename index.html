<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Profile</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #121214;
            --accent: #3fb950; /* 极客绿 */
            --text: #f0f6fc;
            --dim: #8b949e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        /* 头部卡片 */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent);
        }

        h1 { font-size: 1.5rem; margin: 15px 0 5px; }
        .title { color: var(--dim); font-size: 0.9rem; margin-bottom: 20px; }

        /* 技能块 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #1f2937;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
        }

        /* 模拟终端视窗 */
        .terminal {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.85rem;
        }

        .line { margin-bottom: 6px; }
        .blue { color: #58a6ff; }
        .purple { color: #bc8cff; }
        .orange { color: #ffa657; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            color: var(--dim);
            font-size: 0.75rem;
            margin-top: 20px;
        }
    </style>
</head>
